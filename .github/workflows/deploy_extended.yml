name: SATELLITE PRO - Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # 毎日日本時間11時（UTC 2時）に衛星データ更新
  workflow_dispatch:
    inputs:
      update_satellite:
        description: '衛星データも更新する'
        required: false
        default: 'true'

jobs:
  # =============================================
  # Job 1: 衛星データ取得 → Supabase + JSON保存
  # =============================================
  fetch-satellite-data:
    name: Fetch Satellite Data (GEE + Gemini)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.update_satellite == 'true'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install earthengine-api google-genai supabase exifread

      - name: Fetch & save satellite data
        env:
          EE_SERVICE_ACCOUNT_JSON: ${{ secrets.EE_SERVICE_ACCOUNT_JSON }}
          EE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.EE_SERVICE_ACCOUNT_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python data_processor.py

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: satellite-data
          path: frontend/src/data.json
          retention-days: 7

  # =============================================
  # Job 2: フロントエンドビルド → Cloudflare Pages
  # =============================================
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: [fetch-satellite-data]
    if: always()  # 衛星データ取得が失敗してもビルドは実行
    
    steps:
      - uses: actions/checkout@v4

      - name: Download satellite data (if available)
        uses: actions/download-artifact@v4
        with:
          name: satellite-data
          path: frontend/src/
        continue-on-error: true  # 初回デプロイ時は data.json が存在しない場合がある

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.RENDER_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy frontend/dist
            --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }}
            --commit-dirty=true

  # =============================================
  # Job 3: バックエンドのヘルスチェック
  # =============================================
  health-check:
    name: API Health Check
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: vars.RENDER_API_URL != ''
    
    steps:
      - name: Check Render API health
        run: |
          curl -f "${{ secrets.RENDER_API_URL }}/" || echo "API not reachable (Render may be sleeping)"
        continue-on-error: true

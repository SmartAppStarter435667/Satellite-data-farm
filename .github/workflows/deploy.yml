name: AI Satellite Reporter

on:
  push:
    branches:
      - main
    paths:
      - '**'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  report-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python 3.11 以上にアップグレードして警告を解消
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' 

      # ライブラリを google-genai に変更
      - name: Install dependencies
        run: pip install earthengine-api google-genai

      - name: Run Script
        env:
          EE_SERVICE_ACCOUNT_JSON: ${{ secrets.EE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # 【追加】npmのYes/No確認エラーを回避するため、事前にWranglerをインストール
      - name: Install Wrangler
        run: npm install -g wrangler

       - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          # Secretからプロジェクト名を変数として読み込む
          PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        with:
          [span_1](start_span)apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}[span_1](end_span)
          [span_2](start_span)accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}[span_2](end_span)
          # コマンド内で変数 $PROJECT_NAME を使用
          [span_3](start_span)[span_4](start_span)command: pages deploy public --project-name=$PROJECT_NAME --commit-dirty=true[span_3](end_span)[span_4](end_span)

